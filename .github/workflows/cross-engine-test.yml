name: Casbin Cross-Engine Tests

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.8.1'

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Clone casbin-java-cli
        run: git clone https://github.com/jcasbin/casbin-java-cli.git

      - name: Setup Maven Cache
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('casbin-java-cli/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build casbin-java-cli
        run: |
          cd casbin-java-cli
          mvn clean install
          echo "Listing target directory contents:"
          ls -la target/
          sudo mkdir -p /usr/local/casbin
          sudo cp target/casbin-java-cli-1.0-SNAPSHOT.jar /usr/local/casbin/casbin-java-cli.jar
          sudo tee /usr/local/bin/casbin-java-cli << 'EOF'
          #!/bin/bash
          java -jar /usr/local/casbin/casbin-java-cli.jar "$@"
          EOF
          sudo chmod +x /usr/local/bin/casbin-java-cli
          cd ..

      - name: Verify installation
        run: |
          echo "Verifying casbin-java-cli installation..."
          ls -l /usr/local/bin/casbin-java-cli
          ls -l /usr/local/casbin/casbin-java-cli.jar
          echo "PATH=$PATH"
          which casbin-java-cli || true
          casbin-java-cli --version || true

      - name: Install dependencies
        run: yarn install

      - name: Run tests
        env:
          PATH: /usr/local/bin:${{ env.PATH }}
        run: |
          export PATH="/usr/local/bin:$PATH"
          echo "Current PATH: $PATH"
          which casbin-java-cli
          yarn test 