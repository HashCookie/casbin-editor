name: Build and Release Electron App

on: [push, pull_request]

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v2
      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '20.8.1'
      - name: Install dependencies
        run: yarn install
      - name: Build Electron app for macOS
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: yarn dist --mac
      - name: Upload macOS build artifacts
        uses: actions/upload-artifact@v2
        with:
          name: electron-app-macos
          path: dist/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v2
      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '20.8.1'
      - name: Install dependencies
        run: yarn install
      - name: Build Electron app for Windows
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: yarn dist --win
      - name: Upload Windows build artifacts
        uses: actions/upload-artifact@v2
        with:
          name: electron-app-windows
          path: dist/*.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v2
      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '20.8.1'
      - name: Install dependencies
        run: yarn install
      - name: Build Electron app for Linux
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: yarn dist --linux
      - name: Upload Linux build artifacts
        uses: actions/upload-artifact@v2
        with:
          name: electron-app-linux
          path: dist/*.AppImage

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v2
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.8.1'
      - name: Clear npm cache
        run: npm cache clean --force
      - name: Download macOS build artifacts
        uses: actions/download-artifact@v2
        with:
          name: electron-app-macos
          path: dist/macos
      - name: Download Windows build artifacts
        uses: actions/download-artifact@v2
        with:
          name: electron-app-windows
          path: dist/windows
      - name: Download Linux build artifacts
        uses: actions/download-artifact@v2
        with:
          name: electron-app-linux
          path: dist/linux
      - name: Get tag name
        id: get_tag_name
        run: echo "::set-output name=TAG_NAME::${GITHUB_REF#refs/tags/}"
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ steps.get_tag_name.outputs.TAG_NAME }}
          release_name: Release ${{ steps.get_tag_name.outputs.TAG_NAME }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
      - name: Upload macOS release asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/macos/*.dmg
          asset_name: electron-app-macos.dmg
          asset_content_type: application/octet-stream
      - name: Upload Windows release asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/windows/*.exe
          asset_name: electron-app-windows.exe
          asset_content_type: application/octet-stream
      - name: Upload Linux release asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/linux/*.AppImage
          asset_name: electron-app-linux.AppImage
          asset_content_type: application/octet-stream
